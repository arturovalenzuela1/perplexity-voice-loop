<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Perplexity Voice Research Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
      white-space: pre-wrap;
    }
    .message {
      margin-bottom: 16px;
    }
    .role {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .user .role {
      color: #4caf50;
    }
    .assistant .role {
      color: #03a9f4;
    }
    .content {
      color: #fff;
    }
    #statusBar {
      border-top: 1px solid #333;
      padding: 8px 16px;
      font-size: 12px;
      color: #888;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #statusLeft, #statusRight {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #555;
    }
    .dot.listening {
      background-color: #4caf50;
    }
    .dot.thinking {
      background-color: #ff9800;
    }
    .dot.error {
      background-color: #f44336;
    }
    #partialTranscript {
      color: #aaa;
      font-size: 12px;
      max-width: 70%;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat"></div>
    <div id="statusBar">
      <div id="statusLeft">
        <div id="statusDot" class="dot"></div>
        <span id="statusText">Tap once to start listening…</span>
      </div>
      <div id="statusRight">
        <span id="partialTranscript"></span>
      </div>
    </div>
  </div>
